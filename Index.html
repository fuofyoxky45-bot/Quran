<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #f7f3ed;
    --bg-secondary: #eee7db;
    --bg-card: #ffffff;
    --bg-sidebar: #1a1208;
    --text-primary: #1a1208;
    --text-secondary: #5a4a2f;
    --text-muted: #9a8870;
    --text-sidebar: #e8d9bc;
    --accent-gold: #c9963a;
    --accent-gold-light: #e8b84b;
    --accent-green: #2d6a4f;
    --border: #d4c4a0;
    --shadow: rgba(26,18,8,0.12);
    --verse-bg: #fdf8f0;
    --header-bg: #1a1208;
    --header-text: #e8d9bc;
    --search-bg: #fff;
    --player-bg: #1a1208;
    --player-text: #e8d9bc;
    --surah-hover: #f0e8d5;
    --surah-active: #2d6a4f;
    --surah-active-text: #ffffff;
    --ornament: #c9963a;
  }

  [data-theme="dark"] {
    --bg-primary: #0f0c07;
    --bg-secondary: #1a1510;
    --bg-card: #1e1810;
    --bg-sidebar: #0a0804;
    --text-primary: #e8d9bc;
    --text-secondary: #c4aa80;
    --text-muted: #7a6a50;
    --text-sidebar: #c4aa80;
    --accent-gold: #c9963a;
    --accent-gold-light: #e8b84b;
    --accent-green: #40956e;
    --border: #2a2015;
    --shadow: rgba(0,0,0,0.4);
    --verse-bg: #16120c;
    --header-bg: #0a0804;
    --header-text: #e8d9bc;
    --search-bg: #1e1810;
    --player-bg: #0a0804;
    --player-text: #e8d9bc;
    --surah-hover: #251e12;
    --surah-active: #2d6a4f;
    --surah-active-text: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--accent-gold);
    box-shadow: 0 2px 20px var(--shadow);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Amiri', serif;
    font-size: 18px;
    color: #1a1208;
    font-weight: 700;
  }

  .header-title {
    font-family: 'Amiri', serif;
    font-size: 22px;
    color: var(--accent-gold-light);
    letter-spacing: 0.5px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,150,58,0.3);
    border-radius: 24px;
    padding: 6px 16px;
    gap: 8px;
    transition: all 0.2s;
  }
  .search-bar:focus-within {
    border-color: var(--accent-gold);
    background: rgba(255,255,255,0.12);
  }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--header-text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    width: 200px;
    direction: rtl;
  }
  .search-bar input::placeholder { color: rgba(232,217,188,0.4); }
  .search-icon {
    color: rgba(232,217,188,0.5);
    font-size: 14px;
    cursor: pointer;
  }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(201,150,58,0.3);
    background: rgba(255,255,255,0.06);
    color: var(--accent-gold-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .btn-icon:hover {
    background: rgba(201,150,58,0.2);
    border-color: var(--accent-gold);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--accent-gold);
    border-radius: 2px;
    transition: 0.3s;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg-sidebar);
    border-left: 2px solid rgba(201,150,58,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .sidebar-search {
    padding: 16px;
    border-bottom: 1px solid rgba(201,150,58,0.15);
  }
  .sidebar-search input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,150,58,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text-sidebar);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    outline: none;
    direction: rtl;
    transition: border-color 0.2s;
  }
  .sidebar-search input::placeholder { color: rgba(196,170,128,0.4); }
  .sidebar-search input:focus { border-color: var(--accent-gold); }

  .sidebar-label {
    padding: 10px 16px 6px;
    font-size: 11px;
    color: rgba(196,170,128,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .surah-list {
    overflow-y: auto;
    flex: 1;
  }
  .surah-list::-webkit-scrollbar { width: 4px; }
  .surah-list::-webkit-scrollbar-track { background: transparent; }
  .surah-list::-webkit-scrollbar-thumb { background: rgba(201,150,58,0.3); border-radius: 4px; }

  .surah-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .surah-item:hover { background: rgba(201,150,58,0.08); }
  .surah-item.active { background: var(--accent-green); }

  .surah-num {
    width: 32px;
    height: 32px;
    background: rgba(201,150,58,0.15);
    border: 1px solid rgba(201,150,58,0.25);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent-gold);
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Cairo', sans-serif;
  }
  .surah-item.active .surah-num {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }

  .surah-info { flex: 1; min-width: 0; }
  .surah-name-ar {
    font-family: 'Amiri', serif;
    font-size: 15px;
    color: var(--text-sidebar);
    line-height: 1.3;
  }
  .surah-item.active .surah-name-ar { color: #fff; }
  .surah-meta {
    font-size: 11px;
    color: rgba(196,170,128,0.5);
    margin-top: 1px;
  }
  .surah-item.active .surah-meta { color: rgba(255,255,255,0.6); }

  .surah-type {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .surah-type.meccan { background: rgba(201,150,58,0.15); color: var(--accent-gold); }
  .surah-type.medinan { background: rgba(45,106,79,0.2); color: #5fba8a; }
  .surah-item.active .surah-type { background: rgba(255,255,255,0.2); color: #fff; }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome Screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    gap: 20px;
  }
  .welcome-ornament {
    font-family: 'Amiri', serif;
    font-size: 64px;
    color: var(--accent-gold);
    opacity: 0.3;
    line-height: 1;
  }
  .welcome-title {
    font-family: 'Amiri', serif;
    font-size: 36px;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .welcome-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 400px;
    line-height: 1.7;
  }
  .welcome-verse {
    font-family: 'Amiri Quran', 'Amiri', serif;
    font-size: 22px;
    color: var(--accent-green);
    padding: 20px 32px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-card);
    max-width: 500px;
    line-height: 2;
    box-shadow: 0 4px 24px var(--shadow);
  }

  /* Surah View */
  .surah-view { display: flex; flex-direction: column; }

  .surah-header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 32px 40px;
    text-align: center;
    border-bottom: 2px solid var(--accent-gold);
    position: relative;
    overflow: hidden;
  }
  .surah-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,150,58,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .surah-header-num {
    font-size: 11px;
    color: var(--accent-gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .surah-header-name {
    font-family: 'Amiri', serif;
    font-size: 42px;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }
  .surah-header-en {
    font-size: 14px;
    color: rgba(232,217,188,0.5);
    margin-bottom: 16px;
  }
  .surah-header-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .meta-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(232,217,188,0.7);
  }
  .meta-chip strong { color: var(--accent-gold-light); }

  /* Audio Player */
  .audio-player {
    background: var(--player-bg);
    border-top: 1px solid rgba(201,150,58,0.2);
    border-bottom: 1px solid rgba(201,150,58,0.2);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .player-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--accent-gold);
    background: rgba(201,150,58,0.1);
    color: var(--accent-gold-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .player-btn:hover { background: var(--accent-gold); color: #1a1208; }
  .player-btn.play-btn { width: 48px; height: 48px; font-size: 18px; }

  .player-info { flex: 1; min-width: 0; }
  .player-title {
    font-size: 13px;
    color: var(--accent-gold-light);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-reciter {
    font-size: 11px;
    color: rgba(232,217,188,0.4);
    margin-top: 2px;
  }

  .player-progress { flex: 2; min-width: 120px; display: flex; flex-direction: column; gap: 4px; }
  .progress-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s;
  }
  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(232,217,188,0.4);
  }

  .player-volume {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .volume-icon { color: rgba(232,217,188,0.5); font-size: 14px; }
  input[type=range].volume-slider {
    -webkit-appearance: none;
    width: 70px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
  }
  input[type=range].volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent-gold);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Bismillah */
  .bismillah-wrap {
    text-align: center;
    padding: 28px 24px 16px;
  }
  .bismillah {
    font-family: 'Amiri Quran', 'Amiri', serif;
    font-size: 32px;
    color: var(--accent-green);
    line-height: 1.8;
  }

  /* Verses */
  .verses-container { padding: 0 24px 80px; }

  .verse-card {
    display: flex;
    gap: 0;
    margin-bottom: 2px;
    border-radius: 12px;
    transition: background 0.2s;
    overflow: hidden;
  }
  .verse-card:hover { background: var(--surah-hover); }

  .verse-number {
    width: 52px;
    min-width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 4px;
  }
  .verse-num-badge {
    width: 36px;
    height: 36px;
    background: rgba(201,150,58,0.12);
    border: 1px solid rgba(201,150,58,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent-gold);
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
  }

  .verse-content { flex: 1; padding: 16px 0 16px 12px; }

  .verse-arabic {
    font-family: 'Amiri Quran', 'Amiri', serif;
    font-size: 26px;
    line-height: 2.2;
    color: var(--text-primary);
    text-align: right;
    direction: rtl;
  }

  .verse-divider {
    display: inline;
    color: var(--accent-gold);
    font-size: 20px;
    margin-right: 4px;
  }

  .verse-separator {
    height: 1px;
    background: var(--border);
    margin: 0 0 0 52px;
    opacity: 0.4;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
  }
  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 14px; }

  /* Error */
  .error-msg {
    padding: 40px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .error-msg button {
    margin-top: 12px;
    padding: 8px 20px;
    background: var(--accent-gold);
    border: none;
    border-radius: 8px;
    color: #1a1208;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }

  /* Overlay / Mobile Sidebar */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .hamburger { display: flex; }
    .search-bar { display: none; }
    .sidebar {
      position: fixed;
      top: 64px;
      right: 0;
      height: calc(100vh - 64px);
      z-index: 60;
      transform: translateX(100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .layout { flex-direction: column; }
    .main { height: calc(100vh - 64px); }
    .surah-header { padding: 24px 20px; }
    .surah-header-name { font-size: 32px; }
    .verses-container { padding: 0 12px 80px; }
    .verse-arabic { font-size: 22px; }
    .audio-player { gap: 10px; padding: 10px 16px; }
    .player-progress { min-width: 80px; }
    .header-title { font-size: 18px; }
  }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent-gold);
    color: #1a1208;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 16px rgba(201,150,58,0.4);
    transition: all 0.2s;
    z-index: 40;
  }
  .scroll-top.visible { display: flex; }
  .scroll-top:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,150,58,0.5); }

  /* Animations */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Reading Mode Button ── */
  .reading-mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    border-radius: 24px;
    border: 1px solid rgba(201,150,58,0.4);
    background: rgba(201,150,58,0.08);
    color: var(--accent-gold-light);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reading-mode-toggle:hover { background: rgba(201,150,58,0.18); border-color: var(--accent-gold); }
  .reading-mode-toggle.active { background: var(--accent-gold); color: #1a1208; border-color: var(--accent-gold); }

  /* ── Reading Panel ── */
  .reading-panel {
    border-top: 2px solid var(--accent-gold);
    background: var(--bg-card);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 -4px 24px var(--shadow);
    position: sticky;
    bottom: 0;
    z-index: 10;
  }

  .reading-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .reading-verse-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .reading-verse-label span {
    color: var(--accent-gold);
    font-family: 'Amiri', serif;
    font-size: 16px;
  }

  .reading-stats {
    display: flex;
    gap: 12px;
    font-size: 12px;
  }
  .stat-chip {
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
  }
  .stat-correct { background: rgba(45,160,80,0.15); color: #2da050; }
  .stat-wrong { background: rgba(220,60,60,0.15); color: #e05050; }

  /* Word-by-word display */
  .reading-verse-display {
    font-family: 'Amiri Quran', 'Amiri', serif;
    font-size: 24px;
    line-height: 2.4;
    direction: rtl;
    text-align: right;
    padding: 12px 16px;
    background: var(--verse-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    min-height: 60px;
    word-spacing: 6px;
  }

  .word-span {
    display: inline-block;
    padding: 2px 4px;
    border-radius: 5px;
    cursor: default;
    transition: background 0.15s;
    margin: 1px;
  }
  .word-span.pending { color: var(--text-primary); }
  .word-span.current {
    background: rgba(201,150,58,0.25);
    color: var(--accent-gold);
    border-bottom: 2px solid var(--accent-gold);
    animation: pulse-word 1.2s ease-in-out infinite;
  }
  @keyframes pulse-word {
    0%,100% { background: rgba(201,150,58,0.2); }
    50% { background: rgba(201,150,58,0.38); }
  }
  .word-span.correct {
    background: rgba(45,160,80,0.15);
    color: #2da050;
  }
  .word-span.wrong {
    background: rgba(220,60,60,0.15);
    color: #e05050;
    text-decoration: line-through wavy #e05050;
  }
  .word-span.skipped {
    background: rgba(150,120,60,0.1);

  applyTheme();
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('quran-theme', isDark ? 'dark' : 'light');
  applyTheme();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

// ── Render Surah List ──
function renderSurahList(list) {
  const container = document.getElementById('surahList');
  document.getElementById('surahCount').textContent = list.length;
  if (!list.length) {
    container.innerHTML = '<div class="error-msg">لا توجد نتائج</div>';
    return;
  }
  container.innerHTML = list.map(s => `
    <div class="surah-item ${currentSurah?.id === s.id ? 'active' : ''}" onclick="loadSurah(${s.id})" id="surah-item-${s.id}">
      <div class="surah-num">${s.id}</div>
      <div class="surah-info">
        <div class="surah-name-ar">${s.name}</div>
        <div class="surah-meta">${s.en} · ${s.verses} آية</div>
      </div>
      <span class="surah-type ${s.type}">${s.type === 'meccan' ? 'مكية' : 'مدنية'}</span>
    </div>
  `).join('');
}

// ── Filter ──
function filterSurahs(q) {
  const query = q.trim();
  const other = document.getElementById(q === document.getElementById('headerSearch').value ? 'sidebarSearch' : 'headerSearch');
  other.value = q;
  filteredSurahs = query
    ? SURAHS_META.filter(s => s.name.includes(query) || s.en.toLowerCase().includes(query.toLowerCase()) || String(s.id).includes(query))
    : [...SURAHS_META];
  renderSurahList(filteredSurahs);
}

// ── Load Surah ──
async function loadSurah(id) {
  currentSurah = SURAHS_META.find(s => s.id === id);
  if (!currentSurah) return;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');

  // Update active state
  document.querySelectorAll('.surah-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.getElementById(`surah-item-${id}`);
  if (activeEl) { activeEl.classList.add('active'); activeEl.scrollIntoView({block:'nearest'}); }

  // Show loading
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="loading fade-in">
      <div class="loading-spinner"></div>
      <span class="loading-text">جارٍ تحميل سورة ${currentSurah.name}...</span>
    </div>
  `;

  try {
    const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    renderSurah(data.data);
  } catch (e) {
    main.innerHTML = `
      <div class="error-msg fade-in">
        <p>⚠️ تعذّر تحميل السورة، تحقق من الاتصال بالإنترنت</p>
        <button onclick="loadSurah(${id})">إعادة المحاولة</button>
      </div>
    `;
  }
}

      <div class="audio-player">
        <button class="player-btn" onclick="seekAudio(-10)" title="رجوع 10 ثواني">⏪</button>
        <button class="player-btn play-btn" id="playBtn" onclick="togglePlay()">▶️</button>
        <button class="player-btn" onclick="seekAudio(10)" title="تقديم 10 ثواني">⏩</button>
        <div class="player-info">
          <div class="player-title">سورة ${s.name}</div>
          <div class="player-reciter">عبد الباسط عبد الصمد</div>
        </div>
        <div class="player-progress">
          <div class="progress-bar-wrap" onclick="seekToClick(event)">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-times">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>
        <div class="player-volume">
          <span class="volume-icon">🔊</span>
          <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        </div>
        <button class="reading-mode-toggle" id="readingModeBtn" onclick="toggleReadingMode()">
          📖 وضع القراءة
        </button>
      </div>

      ${hasBismillah ? `<div class="bismillah-wrap"><div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div></div>` : ''}

      <div class="verses-container" id="versesContainer">
        ${data.ayahs.map((v, i) => `
          <div class="verse-card" id="v${v.numberInSurah}" data-vidx="${i}">
            <div class="verse-number">
              <div class="verse-num-badge">${v.numberInSurah}</div>
            </div>
            <div class="verse-content">
              <div class="verse-arabic" id="verse-text-${i}">${v.text} <span class="verse-divider">۝${toArabicNum(v.numberInSurah)}</span></div>
            </div>
          </div>
          ${i < data.ayahs.length - 1 ? '<div class="verse-separator"></div>' : ''}
        `).join('')}
      </div>

      <!-- Reading Panel (hidden by default) -->
      <div class="reading-panel" id="readingPanel" style="display:none;">
        <div class="reading-panel-header">
          <div class="reading-verse-label">
            الآية <span id="readingVerseNum">1</span>
          </div>
          <div class="reading-stats">
            <span class="stat-chip stat-correct">✓ <span id="statCorrect">0</span></span>
            <span class="stat-chip stat-wrong">✗ <span id="statWrong">0</span></span>
          </div>
        </div>
        <div class="reading-verse-display" id="readingVerseDisplay"></div>
        <div class="verse-complete-banner" id="verseCompleteBanner">
          ✅ أحسنت! الآية مكتملة
        </div>
        <div class="reading-input-wrap">
          <input
            class="reading-input"
            id="readingInput"
            type="text"
            placeholder="اكتب الكلمة التالية..."
            oninput="handleReadingInput()"
            onkeydown="handleReadingKey(event)"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            dir="rtl"
          >
          <div class="reading-action-btns">
            <button class="reading-btn hint-btn" onclick="showHint()">💡 تلميح</button>
            <button class="reading-btn" onclick="skipWord()">تخطي ›</button>
            <button class="reading-btn next-verse-btn" id="nextVerseBtn" onclick="nextVerse()" style="display:none;">الآية التالية ›</button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Popups (injected once)
  if (!document.getElementById('errorPopup')) {
    const ep = document.createElement('div');
    ep.className = 'error-popup';
    ep.id = 'errorPopup';
    document.body.appendChild(ep);
    const cp = document.createElement('div');
    cp.className = 'correct-popup';
    cp.id = 'correctPopup';
    document.body.appendChild(cp);
  }

  // Setup audio
  stopAudio();
  audio.src = audioUrl;
  audio.onloadedmetadata = () => {
    document.getElementById('totalTime').textContent = formatTime(audio.duration);
  };
  audio.ontimeupdate = updateProgress;
  audio.onended = () => {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶️';
  };

  main.scrollTo(0, 0);
}

// ── Reading Mode ──
function toggleReadingMode() {
  readingMode = !readingMode;
  const btn = document.getElementById('readingModeBtn');
  const panel = document.getElementById('readingPanel');
  if (readingMode) {
    btn.classList.add('active');
    btn.textContent = '✕ إغلاق القراءة';
    panel.style.display = 'flex';
    readingVerseIdx = 0;
    readingWordIdx = 0;
    readingCorrect = 0;
    readingWrong = 0;
    updateStats();
    startReadingVerse();
    setTimeout(() => document.getElementById('readingInput')?.focus(), 100);
  } else {
    btn.classList.remove('active');
    btn.textContent = '📖 وضع القراءة';
    panel.style.display = 'none';
    // Clear all highlights
    document.querySelectorAll('.verse-card').forEach(c => {
      c.classList.remove('reading-active','reading-done');
    });
    document.querySelectorAll('[id^="verse-text-"]').forEach(el => {
      const idx = parseInt(el.id.split('-')[2]);
      if (currentAyahs[idx]) {
        el.innerHTML = currentAyahs[idx].text + ` <span class="verse-divider">۝${toArabicNum(currentAyahs[idx].numberInSurah)}</span>`;
      }
    });
  }
}

function getWords(verseText) {
  // Strip tashkeel for comparison but keep original for display
  return verseText.split(/\s+/).filter(w => w.length > 0);
}

function normalizeArabic(str) {
  return str
    .replace(/[\u064B-\u065F\u0670]/g, '') // remove tashkeel
    .replace(/أ|إ|آ/g, 'ا')
    .replace(/ة/g, 'ه')
    .replace(/ى/g, 'ي')
    .replace(/\u0640/g, '') // tatweel
    .trim();
}

function startReadingVerse() {
  if (readingVerseIdx >= currentAyahs.length) {
    finishReading();
    return;
  }
  readingWordIdx = 0;
  const ayah = currentAyahs[readingVerseIdx];
  const words = getWords(ayah.text);

  // Update label
  document.getElementById('readingVerseNum').textContent = ayah.numberInSurah;

  // Highlight active verse card
  document.querySelectorAll('.verse-card').forEach((c, i) => {
    c.classList.remove('reading-active');
    if (i < readingVerseIdx) c.classList.add('reading-done');
  });
  const activeCard = document.getElementById(`v${ayah.numberInSurah}`);
  if (activeCard) {
    activeCard.classList.add('reading-active');
    activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Build word spans in display
  renderReadingDisplay(words, -1, []);

  // Reset input
  const inp = document.getElementById('readingInput');
  if (inp) { inp.value = ''; inp.classList.remove('input-correct','input-wrong'); }
  document.getElementById('verseCompleteBanner').classList.remove('show');
  document.getElementById('nextVerseBtn').style.display = 'none';
  document.getElementById('readingInput').style.display = '';
  document.querySelector('.hint-btn').style.display = '';
  document.querySelector('.reading-btn:not(.hint-btn):not(.next-verse-btn)').style.display = '';
}

function renderReadingDisplay(words, currentIdx, results) {
  // results: array of {idx, correct} per checked word
  const resultMap = {};
  results.forEach(r => resultMap[r.idx] = r.correct);

  const html = words.map((w, i) => {
    let cls = 'pending';
    if (i === currentIdx) cls = 'current';
    else if (i in resultMap) cls = resultMap[i] ? 'correct' : 'wrong';
    else if (currentIdx > i && !(i in resultMap)) cls = 'skipped';
    return `<span class="word-span ${cls}" id="rw-${i}">${w}</span>`;
  }).join(' ');
  document.getElementById('readingVerseDisplay').innerHTML = html;
}

// State for current verse words & results
let _verseWords = [];
let _wordResults = [];

function handleReadingInput() {
  if (!readingMode) return;
  const inp = document.getElementById('readingInput');
  const val = inp.value;
  // Remove trailing space trigger handled in keydown
  inp.classList.remove('input-correct','input-wrong');
  // Live feedback: color input if typed matches start of word
  const ayah = currentAyahs[readingVerseIdx];
  if (!ayah) return;
  const words = getWords(ayah.text);
  const currentWord = words[readingWordIdx] || '';
  if (val.length > 0) {
    const norm = normalizeArabic(val);
    const normWord = normalizeArabic(currentWord);
    if (normWord.startsWith(norm)) {
      inp.classList.add('input-correct');
    } else {
      inp.classList.add('input-wrong');
    }
  }
}

function handleReadingKey(e) {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    checkWord();
  }
}

function checkWord() {
  const inp = document.getElementById('readingInput');
  const typed = inp.value.trim();
  if (!typed) return;

  const ayah = currentAyahs[readingVerseIdx];
  if (!ayah) return;
  const words = getWords(ayah.text);

  if (readingWordIdx >= words.length) return;

  const expected = words[readingWordIdx];
  const isCorrect = normalizeArabic(typed) === normalizeArabic(expected);

  // Record result
  _wordResults.push({ idx: readingWordIdx, correct: isCorrect });
  if (isCorrect) {
    readingCorrect++;
    showCorrectPopup();
  } else {
    readingWrong++;
    showErrorPopup(expected, typed);
  }
  updateStats();

  readingWordIdx++;
  inp.value = '';
  inp.classList.remove('input-correct','input-wrong');

  // Re-render display
  if (readingWordIdx < words.length) {
    renderReadingDisplay(words, readingWordIdx, _wordResults);
  } else {
    // Verse complete
    renderReadingDisplay(words, -1, _wordResults);
    verseComplete();
  }
}

function verseComplete() {
  document.getElementById('verseCompleteBanner').classList.add('show');
  document.getElementById('nextVerseBtn').style.display = 'inline-block';
  document.getElementById('readingInput').style.display = 'none';
  document.querySelector('.hint-btn').style.display = 'none';
  document.querySelector('.reading-btn:not(.hint-btn):not(.next-verse-btn)').style.display = 'none';

  // Mark verse card done
  const ayah = currentAyahs[readingVerseIdx];
  const card = document.getElementById(`v${ayah.numberInSurah}`);
  if (card) { card.classList.remove('reading-active'); card.classList.add('reading-done'); }
}

function nextVerse() {
  readingVerseIdx++;
  _wordResults = [];
  if (readingVerseIdx >= currentAyahs.length) {
    finishReading();
  } else {
    startReadingVerse();
    setTimeout(() => document.getElementById('readingInput')?.focus(), 100);
  }
}

function finishReading() {
  const panel = document.getElementById('readingPanel');
  const total = readingCorrect + readingWrong;
  const pct = total ? Math.round((readingCorrect / total) * 100) : 100;
  panel.innerHTML = `
    <div style="text-align:center;padding:20px;gap:12px;display:flex;flex-direction:column;align-items:center;">
      <div style="font-size:40px;">${pct >= 80 ? '🏆' : pct >= 50 ? '📈' : '📚'}</div>
      <div style="font-family:'Amiri',serif;font-size:22px;color:var(--accent-gold);">انتهيت من السورة!</div>
      <div style="font-size:15px;color:var(--text-secondary);">
        صحيح: <strong style="color:#2da050;">${readingCorrect}</strong> &nbsp;|&nbsp;
        خطأ: <strong style="color:#e05050;">${readingWrong}</strong> &nbsp;|&nbsp;
        النتيجة: <strong style="color:var(--accent-gold);">${pct}%</strong>
      </div>
      <button onclick="restartReading()" style="padding:10px 24px;background:var(--accent-gold);border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:#1a1208;margin-top:4px;">إعادة القراءة</button>
    </div>
  `;
}

function restartReading() {
  readingVerseIdx = 0;
  readingWordIdx = 0;
  readingCorrect = 0;
  readingWrong = 0;
  _wordResults = [];
  // Re-build panel
  const panel = document.getElementById('readingPanel');
  panel.innerHTML = `
    <div class="reading-panel-header">
      <div class="reading-verse-label">الآية <span id="readingVerseNum">1</span></div>
      <div class="reading-stats">
        <span class="stat-chip stat-correct">✓ <span id="statCorrect">0</span></span>
        <span class="stat-chip stat-wrong">✗ <span id="statWrong">0</span></span>
      </div>
    </div>
    <div class="reading-verse-display" id="readingVerseDisplay"></div>
    <div class="verse-complete-banner" id="verseCompleteBanner">✅ أحسنت! الآية مكتملة</div>
    <div class="reading-input-wrap">
      <input class="reading-input" id="readingInput" type="text" placeholder="اكتب الكلمة التالية..."
        oninput="handleReadingInput()" onkeydown="handleReadingKey(event)"
        autocomplete="off" autocorrect="off" spellcheck="false" dir="rtl">
      <div class="reading-action-btns">
        <button class="reading-btn hint-btn" onclick="showHint()">💡 تلميح</button>
        <button class="reading-btn" onclick="skipWord()">تخطي ›</button>
        <button class="reading-btn next-verse-btn" id="nextVerseBtn" onclick="nextVerse()" style="display:none;">الآية التالية ›</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('reading-active','reading-done'));
  startReadingVerse();
  setTimeout(() => document.getElementById('readingInput')?.focus(), 100);
}

function showHint() {
  const ayah = currentAyahs[readingVerseIdx];
  if (!ayah) return;
  const words = getWords(ayah.text);
  const word = words[readingWordIdx] || '';
  // Show first 2 chars
  const hint = word.slice(0, 2) + '...';
  showPopup('errorPopup', `💡 التلميح: ${hint}`, 2000);
}

function skipWord() {
  const ayah = currentAyahs[readingVerseIdx];
  if (!ayah) return;
  const words = getWords(ayah.text);
  if (readingWordIdx >= words.length) return;
  readingWrong++;
  _wordResults.push({ idx: readingWordIdx, correct: false });
  updateStats();
  readingWordIdx++;
  const inp = document.getElementById('readingInput');
  if (inp) { inp.value = ''; inp.classList.remove('input-correct','input-wrong'); }
  if (readingWordIdx < words.length) {
    renderReadingDisplay(words, readingWordIdx, _wordResults);
  } else {
    renderReadingDisplay(words, -1, _wordResults);
    verseComplete();
  }
}

function updateStats() {
  const sc = document.getElementById('statCorrect');
  const sw = document.getElementById('statWrong');
  if (sc) sc.textContent = readingCorrect;
  if (sw) sw.textContent = readingWrong;
}

// ── Popups ──
let popupTimer = null;
function showErrorPopup(expected, typed) {
  const el = document.getElementById('errorPopup');
  if (!el) return;
  el.textContent = `❌ الصحيح: ${expected}`;
  el.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function showCorrectPopup() {
  const msgs = ['✅ ممتاز!', '✅ أحسنت!', '✅ رائع!', '✅ صحيح!'];
  showPopup('correctPopup', msgs[Math.floor(Math.random() * msgs.length)], 900);
}

function showPopup(id, msg, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── Audio ──
function getAudioUrl(id) {
  const pad = String(id).padStart(3, '0');
  return `https://download.quranicaudio.com/quran/abdulbaset_mujawwad/${pad}.mp3`;
}

function togglePlay() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶️';
  } else {
    audio.play().catch(() => {});
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸️';
  }
}

function stopAudio() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
}

function seekAudio(sec) {
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

function seekToClick(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * (audio.duration || 0);
}

function setVolume(v) { audio.volume = parseFloat(v); }

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const cur = document.getElementById('currentTime');
  if (!fill || !cur) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  fill.style.width = pct + '%';
  cur.textContent = formatTime(audio.currentTime);
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── Utils ──
function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ── Scroll Top ──
function setupScrollTop() {
  const main = document.getElementById('mainContent');
  main.addEventListener('scroll', () => {
    const btn = document.getElementById('scrollTopBtn');
    btn.classList.toggle('visible', main.scrollTop > 300);
  });
}
function scrollToTop() {
  document.getElementById('mainContent').scrollTo({top:0, behavior:'smooth'});
}

init();
</script>
